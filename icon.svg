<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1248"/>
      <stop offset="100%" stop-color="#0d0d1e"/>
    </linearGradient>
    <linearGradient id="el" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="gw" cx="58%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gw2" cx="30%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Glow layers -->
  <ellipse cx="300" cy="256" rx="210" ry="170" fill="url(#gw)"/>
  <ellipse cx="160" cy="256" rx="110" ry="110" fill="url(#gw2)"/>

  <!-- Speaker: body (narrow left) + cone (wide right) as single path -->
  <path d="M112 210 L112 302 L196 302 L302 374 L302 138 L196 210 Z" fill="url(#el)"/>

  <!-- Sound wave 1 — innermost -->
  <path d="M318 206 C378 228 378 284 318 306"
        stroke="url(#el)" stroke-width="30" stroke-linecap="round" fill="none"/>

  <!-- Sound wave 2 — middle -->
  <path d="M350 174 C424 212 424 300 350 338"
        stroke="url(#el)" stroke-width="24" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Sound wave 3 — outermost -->
  <path d="M382 142 C468 194 468 318 382 370"
        stroke="url(#el)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.34"/>
</svg>
